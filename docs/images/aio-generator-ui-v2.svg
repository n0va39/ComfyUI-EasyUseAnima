<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560">
  <defs>
    <linearGradient id="nodeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20262b"/>
      <stop offset="1" stop-color="#15191d"/>
    </linearGradient>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; }
      .small { font-size: 11px; fill: #aeb8bd; }
      .label { font-size: 12px; fill: #cbd2d4; }
      .value { font-size: 12px; fill: #f0ece4; font-weight: 600; }
      .title { font-size: 16px; fill: #f4efe6; font-weight: 700; }
      .section-title { font-size: 12px; fill: #f4efe6; font-weight: 700; letter-spacing: .2px; }
      .muted { font-size: 10px; fill: #8e9aa0; }
      .socket { fill: #1d8a74; stroke: #76d4be; stroke-width: 1.2; }
      .out-socket { fill: #8661d1; stroke: #c6b3ff; stroke-width: 1.2; }
      .panel { fill: #11171c; stroke: #34424a; stroke-width: 1; }
      .field { fill: #0c1115; stroke: #3c4952; stroke-width: 1; }
      .button { fill: #26323a; stroke: #566674; stroke-width: 1; }
      .button-on { fill: #245f50; stroke: #7bd0b1; stroke-width: 1; }
      .warn { fill: #d8b15d; }
      .ok { fill: #7bd0b1; }
    </style>
  </defs>

  <rect width="760" height="560" fill="#0d0f12"/>
  <text x="40" y="34" class="title">Anima AiO Generator DOM UI Draft v2</text>
  <text x="40" y="54" class="small">Goal: sampler controls vertical on the left, feature/output controls on the right, one save control only.</text>

  <g transform="translate(64 78)">
    <rect x="0" y="0" width="632" height="420" rx="10" fill="url(#nodeBg)" stroke="#55636c" stroke-width="1.4"/>
    <rect x="0" y="0" width="632" height="36" rx="10" fill="#262d33"/>
    <rect x="0" y="24" width="632" height="12" fill="#262d33"/>
    <text x="18" y="24" class="title">Anima AiO Generator</text>
    <circle cx="-8" cy="66" r="6" class="socket"/>
    <text x="14" y="70" class="small">easy use anima input</text>
    <circle cx="640" cy="70" r="6" class="out-socket"/>
    <text x="566" y="74" class="small">image</text>
    <circle cx="640" cy="96" r="6" class="out-socket"/>
    <text x="568" y="100" class="small">latent</text>
    <circle cx="640" cy="122" r="6" class="out-socket"/>
    <text x="507" y="126" class="small">metadata_json</text>

    <g transform="translate(16 48)">
      <rect x="0" y="0" width="600" height="52" rx="7" class="panel"/>
      <g transform="translate(12 10)">
        <text x="0" y="12" class="muted">status</text>
        <text x="0" y="31" class="value">ready</text>
      </g>
      <g transform="translate(120 10)">
        <text x="0" y="12" class="muted">size</text>
        <text x="0" y="31" class="value">from prompt data</text>
      </g>
      <g transform="translate(296 10)">
        <text x="0" y="12" class="muted">model</text>
        <text x="0" y="31" class="value">input linked</text>
      </g>
      <g transform="translate(484 12)">
        <rect x="0" y="0" width="104" height="28" rx="6" class="button-on"/>
        <text x="14" y="18" class="value">Save: ON</text>
      </g>
    </g>

    <g transform="translate(16 112)">
      <rect x="0" y="0" width="286" height="282" rx="7" class="panel"/>
      <text x="12" y="22" class="section-title">SAMPLER</text>

      <g transform="translate(12 38)">
        <text x="0" y="12" class="label">Seed</text>
        <rect x="0" y="18" width="172" height="28" rx="5" class="field"/>
        <text x="10" y="37" class="value">123456789</text>
        <rect x="182" y="18" width="38" height="28" rx="5" class="button"/>
        <text x="196" y="37" class="value">R</text>
        <rect x="228" y="18" width="34" height="28" rx="5" class="button"/>
        <text x="240" y="37" class="value">L</text>
        <text x="0" y="62" class="muted">R: new fixed random, L: use last queued seed</text>
      </g>

      <g transform="translate(12 112)">
        <text x="0" y="12" class="label">Seed after generate</text>
        <rect x="0" y="18" width="262" height="28" rx="5" class="field"/>
        <text x="10" y="37" class="value">fixed | randomize | increment | decrement</text>
      </g>

      <g transform="translate(12 164)">
        <text x="0" y="12" class="label">Steps</text>
        <rect x="0" y="18" width="76" height="28" rx="5" class="field"/>
        <text x="10" y="37" class="value">28</text>
        <text x="94" y="12" class="label">CFG</text>
        <rect x="94" y="18" width="76" height="28" rx="5" class="field"/>
        <text x="104" y="37" class="value">5.0</text>
        <text x="188" y="12" class="label">Denoise</text>
        <rect x="188" y="18" width="74" height="28" rx="5" class="field"/>
        <text x="198" y="37" class="value">1.00</text>
      </g>

      <g transform="translate(12 220)">
        <text x="0" y="12" class="label">Sampler</text>
        <rect x="0" y="18" width="126" height="28" rx="5" class="field"/>
        <text x="10" y="37" class="value">euler_ancestral</text>
        <text x="142" y="12" class="label">Scheduler</text>
        <rect x="142" y="18" width="120" height="28" rx="5" class="field"/>
        <text x="152" y="37" class="value">normal</text>
      </g>
    </g>

    <g transform="translate(316 112)">
      <rect x="0" y="0" width="300" height="282" rx="7" class="panel"/>
      <text x="12" y="22" class="section-title">OPTIONS</text>

      <g transform="translate(12 38)">
        <text x="0" y="12" class="label">Mod Guidance</text>
        <rect x="0" y="18" width="132" height="28" rx="5" class="field"/>
        <text x="10" y="37" class="value">prompt data</text>
        <text x="150" y="12" class="label">Profile</text>
        <rect x="150" y="18" width="126" height="28" rx="5" class="field"/>
        <text x="160" y="37" class="value">step_i8_skip27</text>
      </g>

      <g transform="translate(12 90)">
        <text x="0" y="12" class="label">Artist Mix</text>
        <rect x="0" y="18" width="132" height="28" rx="5" class="field"/>
        <text x="10" y="37" class="value">prompt data</text>
        <text x="150" y="12" class="label">Start / Strength</text>
        <rect x="150" y="18" width="126" height="28" rx="5" class="field"/>
        <text x="160" y="37" class="value">0.50 / 1.00</text>
      </g>

      <g transform="translate(12 142)">
        <text x="0" y="12" class="label">Detail Pipeline</text>
        <rect x="0" y="18" width="86" height="28" rx="5" class="button"/>
        <text x="20" y="37" class="value">Highres</text>
        <rect x="96" y="18" width="76" height="28" rx="5" class="button"/>
        <text x="116" y="37" class="value">SAM3</text>
        <rect x="182" y="18" width="94" height="28" rx="5" class="button"/>
        <text x="205" y="37" class="value">Patch</text>
      </g>

      <g transform="translate(12 194)">
        <text x="0" y="12" class="label">Filename prefix</text>
        <rect x="0" y="18" width="276" height="28" rx="5" class="field"/>
        <text x="10" y="37" class="value">EasyUseAnima/AiO</text>
        <text x="0" y="62" class="muted">No second save checkbox here; top Save button owns save state.</text>
      </g>

      <g transform="translate(12 258)">
        <rect x="0" y="0" width="132" height="22" rx="5" class="button"/>
        <text x="28" y="15" class="label">Advanced...</text>
        <rect x="154" y="0" width="122" height="22" rx="5" class="button"/>
        <text x="184" y="15" class="label">Preview...</text>
      </g>
    </g>
  </g>

  <g transform="translate(64 522)">
    <text x="0" y="0" class="small">Implementation note: keep serialized required widgets hidden; DOM edits update widget values and versioned settings before queue/save.</text>
  </g>
</svg>
